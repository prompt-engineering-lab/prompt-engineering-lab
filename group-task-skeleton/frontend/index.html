<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WrocTransit - Your Smart Bus & Tram Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-2xl">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">🚌 WrocTransit 🚊<br><span class="text-lg font-normal text-gray-600">Your Smart Bus & Tram Finder</span></h1>

    <form id="search-form" class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2">🟢 Start point:
            <input type="text" id="start-coord" placeholder="Focus here, then click on map for green marker" required
                class="shadow appearance-none border rounded-lg w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent mb-2">
        </label>
        <label class="block text-gray-700 text-sm font-bold mb-2">🔴 Destination:
            <input type="text" id="end-coord" placeholder="Focus here, then click on map for red marker" required
                class="shadow appearance-none border rounded-lg w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent mb-2">
        </label>
        <label class="block text-gray-700 text-sm font-bold mb-2">Departure time:
            <input type="datetime-local" id="departure-time"
                class="shadow appearance-none border rounded-lg w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mb-2">
        </label>
        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 ease-in-out transform hover:scale-105 mt-2">
            Find Departures
        </button>
    </form>
    <div id="map" class="mb-6 rounded-lg border border-gray-300" style="height: 400px;"></div>
    <div id="status-message" class="mt-4 text-center text-sm text-gray-600"></div>
    <div class="mt-6">
        <label for="json-output" class="block text-gray-700 text-sm font-bold mb-2">API Response (JSON):</label>
        <textarea id="json-output"
                  class="shadow appearance-none border rounded-lg w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent h-64 font-mono text-sm"
                  readonly
                  placeholder="API response will appear here..."></textarea>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
